<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Engineered to move. Built to think.</title>
  <desc id="desc">A tropical night landscape shaped by waves, palm leaves and quiet data paths.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123D35"/>
      <stop offset="0.58" stop-color="#0F5F57"/>
      <stop offset="1" stop-color="#0F7F75"/>
      <animate attributeName="x2" values="1;0.8;1" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF8EC"/>
      <stop offset="1" stop-color="#E4B866"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
    <pattern id="grain" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="1" fill="#FFF8EC" opacity=".05"/>
      <circle cx="22" cy="17" r=".8" fill="#FFF8EC" opacity=".04"/>
    </pattern>
  </defs>
  <rect width="1200" height="500" rx="32" fill="url(#sky)"/>
  <rect width="1200" height="500" rx="32" fill="url(#grain)"/>

  <circle cx="1010" cy="112" r="70" fill="#E4B866" opacity=".14" filter="url(#soft)">
    <animate attributeName="opacity" values=".12;.22;.12" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="112" r="39" fill="url(#sun)" opacity=".9"/>

  <g fill="none" stroke="#1EB8AE" stroke-width="2" opacity=".34">
    <path d="M92 128h102l44 44h82"/>
    <path d="M880 204h76l36-36h88"/>
    <path d="M820 86h70l30 30"/>
    <g fill="#1EB8AE">
      <circle cx="92" cy="128" r="4"/><circle cx="194" cy="128" r="4"/><circle cx="238" cy="172" r="4"/>
      <circle cx="320" cy="172" r="4"/><circle cx="880" cy="204" r="4"/><circle cx="992" cy="168" r="4"/>
      <circle cx="1080" cy="168" r="4"/><circle cx="820" cy="86" r="4"/><circle cx="920" cy="116" r="4"/>
    </g>
    <circle cx="320" cy="172" r="9"><animate attributeName="r" values="7;13;7" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(0 4)" opacity=".26" fill="#071E1A">
    <path d="M0 0h178c-56 24-93 57-121 105C40 67 24 36 0 20z"/>
    <path d="M40 0c32 38 42 74 42 126l18-2C103 72 92 34 72 0z"/>
    <path d="M1200 0h-135c43 26 75 61 94 101 13-42 24-67 41-84z"/>
    <path d="M1134 0c-22 38-28 76-26 117l-17-1c-2-45 4-84 16-116z"/>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <text x="600" y="202" fill="#FFF8EC" font-size="62" font-weight="800" letter-spacing="4">ENGINEERED TO MOVE.</text>
    <text x="600" y="274" fill="#E4B866" font-size="62" font-weight="800" letter-spacing="4">BUILT TO THINK.</text>
    <path d="M425 302h350" stroke="#1EB8AE" stroke-width="3" stroke-linecap="round" opacity=".9"/>
    <text x="600" y="346" fill="#FFF8EC" font-size="22" font-weight="600" letter-spacing="1.8">AUTOMOTIVE ENGINEER. AI BUILDER. INDEPENDENT MIND.</text>
    <text x="600" y="383" fill="#FFF8EC" opacity=".82" font-size="18">I build intelligent products where engineering, real life and curiosity meet.</text>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M0 423c140-48 246 50 392 10s248-37 392 7 254 26 416-34v94H0z" fill="#0B665E" opacity=".7"/>
    <path d="M-30 446c150-48 262 51 414 8s261-34 402 10 271 20 444-44" stroke="#1EB8AE" stroke-width="5" opacity=".65">
      <animateTransform attributeName="transform" type="translate" values="-18 0;18 0;-18 0" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M-40 472c170-44 273 34 423 0s260-20 404 11 264 8 453-34" stroke="#FFF8EC" stroke-width="2" opacity=".3">
      <animateTransform attributeName="transform" type="translate" values="22 0;-22 0;22 0" dur="15s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
