<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">The thread through everything</title>
  <desc id="desc">Four principles for practical, human-centered technology.</desc>
  <rect width="1200" height="420" rx="30" fill="#FFF8EC"/>
  <path d="M600 62v296M80 210h1040" stroke="#E4B866" stroke-width="2" opacity=".55"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(105 74)">
      <circle cx="35" cy="35" r="34" fill="#123D35"/><path d="M18 35c10-15 24-15 34 0-10 15-24 15-34 0z" fill="none" stroke="#1EB8AE" stroke-width="3"/><circle cx="35" cy="35" r="6" fill="#E4B866"/>
      <text x="92" y="30" fill="#123D35" font-size="24" font-weight="760">Understand the real problem.</text>
      <text x="92" y="56" fill="#18302C" font-size="16" opacity=".72">Start with reality, not assumptions.</text>
    </g>
    <g transform="translate(650 74)">
      <circle cx="35" cy="35" r="34" fill="#0F7F75"/><path d="M21 43l14-20 14 20M27 35h16" fill="none" stroke="#FFF8EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="30" fill="#123D35" font-size="24" font-weight="760">Design the right system.</text>
      <text x="92" y="56" fill="#18302C" font-size="16" opacity=".72">Give the problem a useful structure.</text>
    </g>
    <g transform="translate(105 259)">
      <circle cx="35" cy="35" r="34" fill="#E4B866"/><path d="M20 35h30M35 20v30" stroke="#123D35" stroke-width="3" stroke-linecap="round"/>
      <text x="92" y="30" fill="#123D35" font-size="24" font-weight="760">Build only what matters.</text>
      <text x="92" y="56" fill="#18302C" font-size="16" opacity=".72">Clarity over unnecessary complexity.</text>
    </g>
    <g transform="translate(650 259)">
      <circle cx="35" cy="35" r="34" fill="#E87961"/><circle cx="35" cy="28" r="9" fill="none" stroke="#FFF8EC" stroke-width="3"/><path d="M18 52c3-13 31-13 34 0" fill="none" stroke="#FFF8EC" stroke-width="3" stroke-linecap="round"/>
      <text x="92" y="30" fill="#123D35" font-size="24" font-weight="760">Keep the human in the loop.</text>
      <text x="92" y="56" fill="#18302C" font-size="16" opacity=".72">Technology should support human judgment.</text>
    </g>
  </g>
</svg>
