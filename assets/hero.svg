<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Derya Sarikaya — AI product engineer</title>
  <desc id="desc">A warm, minimal developer banner with a tropical horizon and softly animated ocean waves.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFDF7"/>
      <stop offset="0.55" stop-color="#F8F0DE"/>
      <stop offset="1" stop-color="#DDF4ED"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FD4C6"/>
      <stop offset="0.48" stop-color="#2EB7AC"/>
      <stop offset="1" stop-color="#167B70"/>
      <animate attributeName="x1" values="0;0.16;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0.84;1" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="deepOcean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1C8E82"/>
      <stop offset="1" stop-color="#245F52"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#245F52" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="440" rx="28" fill="url(#sky)"/>

  <g opacity="0.52">
    <circle cx="108" cy="88" r="2.5" fill="#2EB7AC"/>
    <circle cx="152" cy="56" r="1.8" fill="#D6A85F"/>
    <circle cx="1071" cy="123" r="2.2" fill="#2EB7AC"/>
    <circle cx="1110" cy="88" r="1.6" fill="#D6A85F"/>
  </g>

  <g transform="translate(600 58)">
    <rect x="-104" width="208" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.72" stroke="#9BDCD2"/>
    <circle cx="-78" cy="17" r="5" fill="#2EB7AC">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="10" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2" fill="#315B55">AI PRODUCT ENGINEER</text>
  </g>

  <text x="600" y="171" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" letter-spacing="3" fill="#173F3A">DERYA SARIKAYA</text>
  <text x="600" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" letter-spacing="0.2" fill="#315B55">Turning messy real-world problems into useful AI.</text>

  <g transform="translate(600 267)" filter="url(#softShadow)">
    <rect x="-268" y="-22" width="536" height="44" rx="22" fill="#FFFDF8" fill-opacity="0.88"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#18786E">LISTEN  ·  RETRIEVE  ·  REASON  ·  SHIP</text>
  </g>

  <circle cx="1040" cy="284" r="38" fill="#E9BA6B" opacity="0.58"/>
  <circle cx="1040" cy="284" r="49" fill="none" stroke="#E9BA6B" stroke-opacity="0.22">
    <animate attributeName="r" values="45;53;45" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.28;0.08;0.28" dur="6s" repeatCount="indefinite"/>
  </circle>

  <path fill="#B7E7DD" opacity="0.72" d="M0 342 C170 303 292 388 462 348 C642 306 756 391 927 348 C1037 321 1121 323 1200 345 L1200 440 L0 440 Z">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M0 342 C170 303 292 388 462 348 C642 306 756 391 927 348 C1037 321 1121 323 1200 345 L1200 440 L0 440 Z;
              M0 350 C146 390 298 306 474 351 C650 396 798 310 940 350 C1045 380 1125 375 1200 350 L1200 440 L0 440 Z;
              M0 342 C170 303 292 388 462 348 C642 306 756 391 927 348 C1037 321 1121 323 1200 345 L1200 440 L0 440 Z"/>
  </path>
  <path fill="url(#ocean)" opacity="0.88" d="M0 374 C164 329 318 416 488 369 C650 324 785 406 954 370 C1050 350 1129 352 1200 371 L1200 440 L0 440 Z">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0 374 C164 329 318 416 488 369 C650 324 785 406 954 370 C1050 350 1129 352 1200 371 L1200 440 L0 440 Z;
              M0 370 C164 414 320 329 490 374 C650 417 791 335 954 372 C1058 396 1130 392 1200 374 L1200 440 L0 440 Z;
              M0 374 C164 329 318 416 488 369 C650 324 785 406 954 370 C1050 350 1129 352 1200 371 L1200 440 L0 440 Z"/>
  </path>
  <path fill="url(#deepOcean)" opacity="0.92" d="M0 407 C186 376 315 440 506 404 C687 370 829 434 1000 404 C1078 390 1146 391 1200 407 L1200 440 L0 440 Z">
    <animate attributeName="d" dur="11s" repeatCount="indefinite"
      values="M0 407 C186 376 315 440 506 404 C687 370 829 434 1000 404 C1078 390 1146 391 1200 407 L1200 440 L0 440 Z;
              M0 404 C171 436 329 376 514 408 C695 439 835 378 1005 407 C1086 421 1149 420 1200 404 L1200 440 L0 440 Z;
              M0 407 C186 376 315 440 506 404 C687 370 829 434 1000 404 C1078 390 1146 391 1200 407 L1200 440 L0 440 Z"/>
  </path>
</svg>
